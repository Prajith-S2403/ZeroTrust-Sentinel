services:
  - type: web
    name: zerotrustshare-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after deploying frontend
